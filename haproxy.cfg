global
    maxconn 2048
    nbthread 1

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option http-server-close

frontend rinha
    bind :9999
    default_backend apis

backend apis
    balance roundrobin
    option httpchk GET /ready
    server api1 unix@/sockets/api1.sock check inter 500ms rise 1 fall 2
    server api2 unix@/sockets/api2.sock check inter 500ms rise 1 fall 2
